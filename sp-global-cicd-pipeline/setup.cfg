[flake8]
max-line-length = 100
extend-ignore = E203, W503, D100, D104
exclude =
    .git,
    __pycache__,
    .venv,
    .eggs,
    *.egg,
    build,
    dist
per-file-ignores =
    test_*.py: D100, D101, D102, D103

[tool:pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --color=yes
    --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: integration tests
    unit: unit tests

[isort]
profile = black
line_length = 100
multi_line_output = 3

[mypy]
python_version = 3.10
ignore_missing_imports = True
strict = False
warn_return_any = True
warn_unused_configs = True
